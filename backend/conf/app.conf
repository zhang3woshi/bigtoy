appname = bigtoy
httpport = 11000
runmode = dev
copyrequestbody = true

# Automatic backup (SQLite + images -> data/backup/*.zip)
backup_enabled = true
backup_interval_minutes = 1440
backup_max_files = 3

# Production HTTPS-only defaults (effective when runmode=prod)
prod::force_https = true
prod::enablehttp = false
prod::enablehttps = true
prod::httpsaddr = 0.0.0.0
prod::httpsport = 11001
prod::https_cert_file = conf/certs/fullchain.pem
prod::https_key_file = conf/certs/privkey.pem
prod::auth_secure_cookie = true
prod::allowed_origins = https://your-domain.com
