<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BigToy Garage | Admin Sign In</title>
    <script type="module" crossorigin src="/assets/login-DNNrLPpV.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/api-C6-bf7MV.js">
    <link rel="stylesheet" crossorigin href="/assets/api-LtB_7KjE.css">
  </head>
  <body class="page auth-page">
    <header class="topbar">
      <div class="brand-block">
        <p class="brand-kicker">Secure Access</p>
        <h1 class="brand-title">Admin Authentication</h1>
      </div>
      <a class="nav-link" href="/index.html">Back to Gallery</a>
    </header>

    <main class="auth-shell">
      <section class="auth-card">
        <h2>Sign In</h2>
        <p class="panel-hint">Authenticate before entering model management.</p>

        <form id="login-form" class="model-form">
          <label>
            Username
            <input name="username" class="input" autocomplete="username" required />
          </label>
          <label>
            Password
            <input name="password" type="password" class="input" autocomplete="current-password" required />
          </label>
          <button id="login-btn" type="submit" class="btn-primary">Sign In</button>
        </form>

        <p id="login-status" class="form-status form-status-info" role="status" aria-live="polite"></p>
      </section>
    </main>

  </body>
</html>
