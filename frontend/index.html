<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BigToy Garage | 车模展厅</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="page page-public">
    <header class="topbar">
      <div class="brand-block">
        <p class="brand-kicker">Collector's Catalog</p>
        <h1 class="brand-title">BigToy Garage</h1>
      </div>
      <a class="nav-link" href="/login.html">模型录入</a>
    </header>

    <main class="layout">
      <section class="hero">
        <div>
          <h2>把你的火柴盒与风火轮收藏做成在线车模库</h2>
          <p>按品牌、系列、年份快速浏览，把收藏内容清晰展示在一个页面里。</p>
        </div>
        <div class="hero-stat">
          <span id="total-count">0</span>
          <small>收藏总数</small>
        </div>
      </section>

      <section class="filters">
        <input id="search-input" class="input" type="search" placeholder="搜索名称 / 编号 / 系列 / 标签" />
        <select id="brand-filter" class="input">
          <option value="all">全部品牌</option>
        </select>
      </section>

      <section>
        <div id="loading" class="state-card">正在加载车模数据...</div>
        <div id="error" class="state-card state-error hidden"></div>
        <div id="empty" class="state-card hidden">没有匹配结果，试试其他关键词。</div>
        <div id="model-grid" class="card-grid"></div>
      </section>
    </main>

    <div id="detail-modal" class="detail-modal hidden" aria-hidden="true">
      <div id="detail-modal-backdrop" class="detail-modal-backdrop"></div>
      <div class="detail-modal-panel" role="dialog" aria-modal="true" aria-labelledby="detail-modal-name">
        <button id="detail-modal-close" class="detail-modal-close" type="button" aria-label="关闭详情">
          ×
        </button>

        <div id="detail-modal-empty" class="state-card hidden">未找到该车模，可能已被删除。</div>

        <article id="detail-modal-card" class="detail-card hidden">
          <section class="detail-gallery">
            <div class="detail-main">
              <img id="detail-modal-main-image" alt="" />
              <div id="detail-modal-main-placeholder" class="cover-placeholder hidden">No Image</div>
            </div>
            <div id="detail-modal-thumbs" class="detail-thumbs"></div>
          </section>

          <section class="detail-info">
            <h2 id="detail-modal-name"></h2>
            <p id="detail-modal-code" class="model-code"></p>
            <p id="detail-modal-sub" class="sub"></p>
            <p id="detail-modal-meta" class="meta"></p>

            <dl class="detail-grid">
              <dt>颜色</dt>
              <dd id="detail-modal-color">-</dd>
              <dt>材质</dt>
              <dd id="detail-modal-material">-</dd>
              <dt>创建时间</dt>
              <dd id="detail-modal-created-at">-</dd>
            </dl>

            <div id="detail-modal-tags" class="tags"></div>
            <p id="detail-modal-notes" class="note"></p>
          </section>
        </article>
      </div>
    </div>

    <script type="module" src="/src/public.js"></script>
  </body>
</html>
