<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BigToy Garage | 车模展厅</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="page page-public">
    <header class="topbar">
      <div class="brand-block">
        <span class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 48 48" focusable="false">
            <path d="M10 28.5h28v6H10z" />
            <path d="M13 28.5l4.2-8.5h13.6l4.2 8.5z" />
            <circle cx="16.5" cy="36.5" r="3.4" />
            <circle cx="31.5" cy="36.5" r="3.4" />
          </svg>
        </span>
        <div>
          <p class="brand-kicker">Collector's Catalog</p>
          <h1 class="brand-title brand-title-art">zhang3woshi的车库</h1>
        </div>
      </div>
      <div class="topbar-actions">
        <a class="nav-link hero-entry-link" href="/login.html">模型录入</a>
        <div class="hero-stat topbar-stat">
          <span id="total-count">0</span>
          <small>收藏总数</small>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="hero">
        <div class="hero-left">
          <div class="hero-content">
            <section class="hero-panel hero-copy-panel" aria-label="页面介绍">
              <div class="hero-copy">
                <h2>把你的火柴盒与风火轮收藏做成在线车模库</h2>
                <p>按品牌、系列、年份快速浏览，把收藏内容清晰展示在一个页面里。</p>
              </div>
            </section>

            <section class="hero-panel hero-search-panel" aria-label="搜索筛选">
              <div class="filters">
                <input id="search-input" class="input" type="search" placeholder="搜索名称 / 编号 / 系列 / 标签" />
                <select id="brand-filter" class="input">
                  <option value="all">全部品牌</option>
                </select>
              </div>
            </section>

            <section class="hero-board hero-panel hero-board-panel" aria-label="收藏看板">
              <p class="hero-board-title">收藏看板</p>
              <div class="hero-board-grid">
                <article class="hero-board-item">
                  <small>品牌数</small>
                  <strong id="hero-brand-count">0</strong>
                </article>
                <article class="hero-board-item">
                  <small>标签数</small>
                  <strong id="hero-tag-count">0</strong>
                </article>
                <article class="hero-board-item hero-board-item-wide">
                  <small>最近更新</small>
                  <strong id="hero-latest-model">-</strong>
                  <span id="hero-latest-meta" class="hero-board-meta">暂无数据</span>
                </article>
              </div>
            </section>
          </div>
        </div>
        <div class="hero-random">
          <div class="hero-random-head">
            <span class="hero-random-badge">热门</span>
            <span class="hero-random-line"></span>
          </div>
          <div class="hero-random-window">
            <button id="hero-random-prev" class="hero-random-nav hero-random-nav-prev" type="button" aria-label="上一条">‹</button>
            <div id="hero-random-slide" class="hero-random-slide"></div>
            <button id="hero-random-next" class="hero-random-nav hero-random-nav-next" type="button" aria-label="下一条">›</button>
            <div class="hero-random-overlay">
              <p id="hero-random-caption" class="hero-random-caption"></p>
              <div id="hero-random-dots" class="hero-random-dots"></div>
            </div>
          </div>
        </div>
      </section>

      <section>
        <div id="loading" class="state-card">正在加载车模数据...</div>
        <div id="error" class="state-card state-error hidden"></div>
        <div id="empty" class="state-card hidden">没有匹配结果，试试其他关键词。</div>
        <div id="model-grid" class="card-grid"></div>
      </section>
    </main>

    <footer class="site-footer">
      <a data-v-7ffd9eb3="" href="https://beian.miit.gov.cn" target="_blank" rel="noopener noreferrer">沪ICP备2022001311号-1</a>
    </footer>

    <div id="detail-modal" class="detail-modal hidden" aria-hidden="true">
      <div id="detail-modal-backdrop" class="detail-modal-backdrop"></div>
      <div class="detail-modal-panel" role="dialog" aria-modal="true" aria-labelledby="detail-modal-name">
        <button id="detail-modal-close" class="detail-modal-close" type="button" aria-label="关闭详情">
          ×
        </button>

        <div id="detail-modal-empty" class="state-card hidden">未找到该车模，可能已被删除。</div>

        <article id="detail-modal-card" class="detail-card hidden">
          <section class="detail-gallery">
            <div class="detail-main">
              <img id="detail-modal-main-image" alt="" />
              <div id="detail-modal-main-placeholder" class="cover-placeholder hidden">No Image</div>
            </div>
            <div id="detail-modal-thumbs" class="detail-thumbs"></div>
          </section>

          <section class="detail-info">
            <h2 id="detail-modal-name"></h2>
            <p id="detail-modal-code" class="model-code"></p>
            <p id="detail-modal-sub" class="sub"></p>
            <p id="detail-modal-meta" class="meta"></p>

            <dl class="detail-grid">
              <dt>颜色</dt>
              <dd id="detail-modal-color">-</dd>
              <dt>材质</dt>
              <dd id="detail-modal-material">-</dd>
              <dt>创建时间</dt>
              <dd id="detail-modal-created-at">-</dd>
            </dl>

            <div id="detail-modal-tags" class="tags"></div>
            <p id="detail-modal-notes" class="note"></p>
          </section>
        </article>
      </div>
    </div>

    <script type="module" src="/src/public.js"></script>
  </body>
</html>
